name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: stvshy
          template: classic
          config_timezone: Europe/Warsaw

          # --- PODSTAWOWE STATYSTYKI ---
          # Włączamy activity z powrotem, żeby mieć licznik commitów
          base: header, activity, repositories, community
          base_indepth: yes
          
          # --- LINIE KODU ---
          plugin_lines: yes
          plugin_lines_history_limit: 0
          plugin_lines_repositories_limit: 100

          # --- JĘZYKI (UKŁAD 16 JĘZYKÓW) ---
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 16
          plugin_languages_recent_load: 1000
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          
          # --- CHIRURGICZNE CIĘCIE (CSS) ---
          # Tutaj zostawiamy tylko to, co chcesz widzieć
          body_style: |
            /* Ukrywamy nagłówek i social info */
            .header-name, .follow-info, .notices, .introduction { display: none !important; }
            
            /* Ukrywamy wykres aktywności (te kropki/linie), zostawiając same liczby */
            .activity-calendar, svg[height="34"] { display: none !important; }
            
            /* Filtrowanie sekcji Activity - zostawiamy Commits i Pull requests opened */
            div[data-lines*="reviewed"], 
            div[data-lines*="Issues opened"], 
            div[data-lines*="Issue comments"] { display: none !important; }
            
            /* Filtrowanie sekcji Repositories - zostawiamy rozmiar i linie kodu */
            div[data-lines*="license"], 
            div[data-lines*="releases"], 
            div[data-lines*="packages"] { display: none !important; }
            
            /* Filtrowanie sekcji Community - ukrywamy wszystko o co prosiłeś */
            .community-stats .field, 
            div[data-lines*="Member of"], 
            div[data-lines*="Sponsoring"], 
            div[data-lines*="Starred"], 
            div[data-lines*="Watching"],
            div[data-lines*="Watchers"],
            div[data-lines*="Forkers"],
            div[data-lines*="Stargazer"] { display: none !important; }
