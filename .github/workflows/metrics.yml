name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

# --- TUTAJ SĄ UPRAWNIENIA ---
permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: stvshy
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Warsaw
          
          # Plugin 1: Linijki kodu (ALL-TIME)
          plugin_lines: yes
          plugin_lines_history_limit: 0
          plugin_lines_repositories_limit: 100
          plugin_lines_sections: base
          
          # Plugin 2: Języki (Więcej języków, widok z LINIJKAMI i procentami)
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 15
          plugin_languages_sections: most-used
          # Zmienione na linijki i procenty!
          plugin_languages_details: lines, percentage
