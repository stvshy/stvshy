name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: stvshy
          committer_branch: output-metrics
          template: classic
          config_timezone: Europe/Warsaw
          
          # --- TRYB WIDOKU ---
          config_display: regular 

          # --- PODSTAWY (BEZ HEADERÓW/KAFELKÓW) ---
          base: activity, repositories
          base_indepth: yes
          
          # --- LINIJKI KODU (ALL-TIME) ---
          plugin_lines: yes
          plugin_lines_history_limit: 0
          plugin_lines_repositories_limit: 100
          plugin_lines_sections: base
          
          # --- JĘZYKI (MAX OKRES + MAX ILOŚĆ) ---
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 16
          plugin_languages_details: lines, percentage
          plugin_languages_sections: most-used
          # Zwiększamy limity czasowe, żeby szukało jak najgłębiej (All-Time):
          plugin_languages_analysis_timeout: 60
          plugin_languages_analysis_timeout_repositories: 15
          plugin_languages_ignored: "jupyter notebook"       
          # Podmiana koloru 1. języka (indeks 0) na błękitny itd. 3 na ostatnie, ostatnie na 1, 1 na 3 
          plugin_languages_colors: "0:#42b5fc, 1:#8A2BE2, 2:#3d5fc0, 3:#F39C12, 4:#E74C3C, 5:#F1C40F, 6:#FF69B4, 7:#2ECC71"          
          # Customowe nazwy języków
          plugin_languages_aliases: "TSX:TypeScript"
          
          # --- STYLOWANIE (KOLORY) ---
          extras_css: |
            h2, .header-title { color: #319ef7 !important; } 
            h3.field { color: #42b5fc !important; }
            .field svg { fill: #6b26b5 !important; } 
            
          # --- WYCINAMY ŚMIECI ---
          extras_js: |
            document.querySelectorAll('.field').forEach(field => {
              const text = field.innerText || "";
              if (
                text.includes('reviewed') || 
                text.includes('Issues') || 
                text.includes('issue') || 
                text.includes('license') || 
                text.includes('Releases') || 
                text.includes('Packages') || 
                text.includes('Forkers') ||
                text.includes('Sponsors')
              ) {
                field.remove();
              }
            });
